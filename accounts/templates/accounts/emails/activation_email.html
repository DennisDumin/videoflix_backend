<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Activate your Videoflix account</title>
</head>
<body style="margin:0; padding:0; background:#f7f7fb; font-family:Arial, Helvetica, sans-serif; color:#141414;">
  <table role="presentation" width="100%" cellspacing="0" cellpadding="0" style="background:#f7f7fb; padding:32px 12px;">
    <tr>
      <td align="center">
        <table role="presentation" width="100%" cellspacing="0" cellpadding="0" style="max-width:560px; background:#ffffff; border-radius:16px; overflow:hidden;">
          <tr>
            <td style="padding:32px 32px 8px; text-align:center;">
              <div style="font-size:30px; font-weight:800; color:#2e3edf; letter-spacing:0;">VIDEOFLIX</div>
            </td>
          </tr>
          <tr>
            <td style="padding:24px 32px 8px; font-size:16px; line-height:1.6;">
              <p style="margin:0 0 16px;">Dear {{ user_email }},</p>
              <p style="margin:0 0 16px;">Thank you for registering with Videoflix. Please confirm your email address to activate your account.</p>
            </td>
          </tr>
          <tr>
            <td align="center" style="padding:24px 32px;">
              <a href="{{ activation_url }}" style="display:inline-block; background:#2e3edf; color:#ffffff; padding:14px 28px; border-radius:40px; font-size:18px; font-weight:700; text-decoration:none;">Activate account</a>
            </td>
          </tr>
          <tr>
            <td style="padding:8px 32px 32px; font-size:15px; line-height:1.6; color:#535456;">
              <p style="margin:0 0 16px;">If you did not create this account, you can ignore this email.</p>
              <p style="margin:0;">Best regards,<br>Your Videoflix Team</p>
            </td>
          </tr>
        </table>
      </td>
    </tr>
  </table>
</body>
</html>
